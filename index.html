<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="header"><h1>Etch-a-Sketch</h1></div>
    <div class="content">
      <div class="grid-container"></div>
      <div class="controls">
        <div class="slide-container">
          <p>Change grid size:</p>
          <input type="range" min="2" max="60" value="16" class="slider" />
          <p>Size: <span class="slider-value"></span></p>
        </div>
        <div><button type="button" class="btn-clear">Clear</button></div>
      </div>
    </div>
  </body>
</html>
